<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form</title>
        <link rel="stylesheet" href="style/style.css">
    </head>
    <body>
        <main>
            <header>
                <form>
                    <fieldset class="fieldset">
                    <legend class="legend">ثبت نام</legend>
                        <h1 class="h1">سلام به همه</h1>
                        <p class="p">اسم :</p>
                        <input class="input" type="text" placeholder="اسم خود رو وارد کن">
                        <p class="p1">سن : </p>
                        <input class="input1" type="number" placeholder="سنت رو وارد کن">
                        <h2 class="h2">جنسیت</h2>
                        <p class="p2">زن : </p>
                        <input class="input2" type="radio" name="az">
                        <p class="p3">مرد : </p>
                        <input class="input3" type="radio" name="az">
                        <p class="p4">ربات : </p>
                        <input class="input4" type="radio" name="az">
                        <p class="p5">رشته های علاقه مند : </p>
                        <p class="p6">کامپیوتر</p>
                        <input class="input5" type="checkbox">
                        <p class="p7">مکانیکی</p>
                        <input class="input6" type="checkbox">
                        <p class="p8">برق</p>
                        <input class="input7" type="checkbox">
                        <p class="p9">ریاضی</p>
                        <input class="input8" type="checkbox">
                        <p class="p10">تجربی</p>
                        <input class="input9" type="checkbox">
                        <p class="p11">انسانی</p>
                        <input class="input10" type="checkbox">
                        <p class="p12">هنر</p>
                        <input class="input11" type="checkbox">
                        <p class="p13">عربی</p>
                        <input class="input12" type="checkbox">
                        <p class="p14">تاسیسات</p>
                        <input class="input13" type="checkbox">
                        <p class="p15">روانشناسی</p>
                        <input class="input14" type="checkbox">
                        <p class="p16">آدرس : </p>
                        <input class="input15" type="text" placeholder="آدرست رو وارد کن">
                        <input class="input-submit" type="submit" value="ثبت">
                        <input class="input-reset" type="reset" value="پاک">
                        <select class="select">
                            <option class="option1">
                                دیپلم
                            </option>
                            <option class="option2">
                                فوق دیپلم
                            </option>
                            <option class="option3">
                                لیسانس
                            </option>
                            <option class="option4">
                                فوق لیسانس
                            </option>
                            <option class="option5">
                                دکترا
                            </option>
                        </select>
                        <select class="select1">
                            <option class="option6">
                                برنامه نویس
                            </option>
                            <option class="option7">
                                کارمند
                            </option>
                            <option class="option8">
                                دانش آموز
                            </option>
                            <option class="option9">
                                دانشجو
                            </option>
                            <option class="option10">
                                سایر شغل ها
                            </option>
                        </select>
                </fieldset>
                </form>
            </header>
        </main>
    </body>
</html>
